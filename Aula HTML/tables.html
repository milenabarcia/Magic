<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Tabelas</title>
</head>

<body>
    <table border="1">
        <!-- tr cria uma linha na tabela  -->
        <thead>
            <!-- thead é o atributo de criar o cabeçalho da tabela  -->
            <th>Marca</th>
            <th>Modelo</th>
            <th>Ano</th>
        </thead>
        <!-- tbody é o atributo que cria o corpo da tabela  -->
        <tbody>

            <!-- td são as colunas -->
            <tr>
                <td rowspan="2">toyota</td>
                <td>corolla</td>
                <td>2020</td>
            </tr>

            </tr>
            <!-- td são as colunas -->
            <tr>

                <td>coronna</td>
                <td>2020</td>
            </tr>
            </tr>
            </tr>
            <!-- td são as colunas -->
            <tr>
                <td>chevrolet</td>
                <td>spin</td>
                <td>2021</td>
            </tr>
            <!-- td são as colunas -->
            <tr>
                <td>toyota</td>
                <td>etios</td>
                <td>2022</td>
            </tr>
            <tr>
                <td colspan="3"> Ultima atualização 10/09/24</td>
            </tr>
            <!-- tfoot é o atributo que cria um rodapé na tabela  -->
        <tfoot>
            <tr>
                <td colspan="3"> meu rodapé na tabela</td>
            </tr>
        </tfoot>
        </tbody>
    </table>

</body>

</html>
